name: Trajectory forecast CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
            sudo apt-get update
            sudo apt-get install -y libgtk2.0-dev pkg-config
            
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install trajectory-forecast editable
        run: pip install -e .

      - name: Install lint tools
        run: pip install flake8

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run inference (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip uninstall -y opencv-python
          pip install opencv-python-headless
          trajectory-forecast --model yolo26n.pt --source "https://tinyurl.com/2f3yrppv" --show False --save False
      
      - name: Run inference (Windows/Mac)
        if: matrix.os != 'ubuntu-latest'
        run: trajectory-forecast --model yolo26n.pt --source "https://tinyurl.com/2f3yrppv" --show False --save False
